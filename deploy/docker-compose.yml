name: dibs

x-app: &app
  build:
    context: ..
    dockerfile: deploy/Dockerfile
  image: dibs:latest
  env_file: [host.env]
  networks: [internal]
  restart: unless-stopped

x-depends: &depends
  postgres:
    condition: service_healthy
  redis:
    condition: service_healthy

# Long-running roles additionally wait for the one-shot init to create the schema.
x-needs-init: &needs-init
  postgres:
    condition: service_healthy
  redis:
    condition: service_healthy
  init:
    condition: service_completed_successfully

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes: ["pgdata:/var/lib/postgresql/data"]
    networks: [internal]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    networks: [internal]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  init:
    <<: *app
    command: ["init"]
    depends_on: *depends
    restart: "no"

  api:
    <<: *app
    command: ["api"]
    depends_on: *needs-init
    # Only the api web port is published, and only on host loopback; an
    # operator reverse proxy terminates TLS and routes to it.
    ports: ["127.0.0.1:${API_PORT:-8000}:8000"]
    volumes: ["uploads:/data/uploads"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  worker:
    <<: *app
    command: ["worker"]
    depends_on: *needs-init

  scheduler:
    <<: *app
    command: ["scheduler"]
    depends_on: *needs-init

  device:
    <<: *app
    command: ["device"]
    depends_on: *needs-init
    # The device port terminates its own TLS inside the stack (nodes pin the CA).
    ports: ["${DEVICE_PORT:-8443}:8443"]
    volumes: ["uploads:/data/uploads", "./tls:/tls:ro"]
    healthcheck:
      test: ["CMD", "python", "-c", "import ssl,urllib.request; urllib.request.urlopen('https://localhost:8443/healthz', context=ssl._create_unverified_context())"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  pgdata: {}
  uploads: {}

networks:
  internal: {}
