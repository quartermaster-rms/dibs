name: CI

on:
  push:
  pull_request:

# CI is a thin wrapper (IMPLEMENTATION-GUIDE §7): it only checks out, provides
# toolchains + service containers, and invokes the make targets.
jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: dibs
          POSTGRES_PASSWORD: dibs
          POSTGRES_DB: dibs_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U dibs -d dibs_test"
          --health-interval 5s --health-timeout 5s --health-retries 20
      redis:
        image: redis:7
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 5s --health-retries 20
    env:
      DATABASE_URL: postgresql+psycopg://dibs:dibs@localhost:5432/dibs_test
      REDIS_URL: redis://localhost:6379/0
      AUTH_MODE: stub
      PLATFORM_TZ: America/Los_Angeles
      COOKIE_SECURE: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: make install
      - run: make lint
      - run: make test

  test-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: make test-deploy
